kind = "web"
previewPath = "/"
title = "YojanaConnect"
version = "1.0.0"
id = "artifacts/yojana-connect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24903

[services.development]
run = "pnpm --filter @workspace/yojana-connect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/yojana-connect", "run", "build" ]
publicDir = "artifacts/yojana-connect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24903"
BASE_PATH = "/"
