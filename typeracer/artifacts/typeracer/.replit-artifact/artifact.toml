kind = "web"
previewPath = "/"
title = "TypeRacer"
version = "1.0.0"
id = "artifacts/typeracer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23161

[services.development]
run = "pnpm --filter @workspace/typeracer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/typeracer", "run", "build" ]
publicDir = "artifacts/typeracer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23161"
BASE_PATH = "/"
